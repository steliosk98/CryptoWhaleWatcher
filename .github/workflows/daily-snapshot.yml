name: Daily snapshot

on:
  schedule:
    # 00:10 UTC — just after the 00:00 data refresh, to snapshot the EOD state.
    - cron: '10 0 * * *'
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Also backfill ~1y of daily prices (one-time)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: daily-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Self-test (pure logic)
        run: node scripts/selftest.mjs

      - name: Backfill daily prices (optional)
        if: ${{ inputs.backfill }}
        run: node scripts/backfill-prices.mjs

      - name: Build EOD daily snapshot + series + signals
        run: node scripts/snapshot-daily.mjs

      - name: Validate output
        run: node scripts/validate.mjs

      - name: Commit daily history
        run: |
          git config user.name "whale-watcher-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily data/series data/signals.json data/index.json
          if git diff --staged --quiet; then
            echo "No daily changes this run."
          else
            git commit -m "chore(data): daily whale snapshot ${{ github.run_id }} [skip ci]"
            git push
          fi
