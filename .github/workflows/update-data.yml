name: Update whale data

on:
  schedule:
    # Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Self-test (pure logic)
        run: node scripts/selftest.mjs

      - name: Fetch whale data from free public APIs
        run: node scripts/fetch-data.mjs

      - name: Validate output
        run: node scripts/validate.mjs

      - name: Commit refreshed snapshot
        run: |
          git config user.name "whale-watcher-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes this run."
          else
            git commit -m "chore(data): refresh whale snapshot [skip ci]"
            git push
          fi
